[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "cd backend && python manage.py collectstatic --noinput 2>/dev/null || true",
]

[start]
cmd = "cd backend && python manage.py migrate && gunicorn nexus.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
