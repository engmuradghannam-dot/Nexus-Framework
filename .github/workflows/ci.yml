name: Nexus Framework CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      working-directory: ./backend
      env:
        SECRET_KEY: test-secret-key
        DB_HOST: localhost
        DB_NAME: nexus_test
        DB_PASSWORD: postgres
        DEBUG: False
      run: |
        python manage.py migrate

    - name: Run tests
      working-directory: ./backend
      env:
        SECRET_KEY: test-secret-key
        DB_HOST: localhost
        DB_NAME: nexus_test
        DB_PASSWORD: postgres
        DEBUG: False
      run: |
        pytest -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./frontend/package.json

    - name: Install dependencies
      working-directory: ./frontend
      # No committed package-lock.json yet, so `npm ci` (which requires one)
      # isn't usable here - `npm install` resolves and installs in one step.
      run: npm install

    - name: Build
      working-directory: ./frontend
      run: npm run build
